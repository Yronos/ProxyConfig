name: Sync and Compile Sukka Rules for mihomo (Scheduled)

on:
  schedule:
    - cron: "30 13 * * *" # 每天 UTC 13:30 (北京时间 21:30)，错开 sing-box 工作流
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-compile-mihomo-rules.yml"

permissions:
  contents: write

concurrency:
  group: mihomo-rules-sukka
  cancel-in-progress: false

env:
  SUKKA_DIR: rules/mihomo/sukka

jobs:
  sync_sukka:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ⚙️ Set up Git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: ⚙️ Install mihomo
        run: |
          set -e

          MIHOMO_VERSION="$(curl -fsSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.tag_name')"
          echo "Latest mihomo version: ${MIHOMO_VERSION}"
          echo "MIHOMO_VERSION=${MIHOMO_VERSION}" >> "$GITHUB_ENV"

      - name: Cache mihomo
        id: cache-mihomo
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/mihomo
          key: mihomo-${{ env.MIHOMO_VERSION }}-linux-amd64

      - name: ⬇️ Download mihomo
        if: steps.cache-mihomo.outputs.cache-hit != 'true'
        run: |
          set -e

          DOWNLOAD_URL="https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"

          curl -L -o "$RUNNER_TEMP/mihomo.gz" "$DOWNLOAD_URL"
          gzip -d -f "$RUNNER_TEMP/mihomo.gz"

          chmod +x "$RUNNER_TEMP/mihomo"
          sudo mv "$RUNNER_TEMP/mihomo" /usr/local/bin/mihomo

      - name: ✅ Verify mihomo installation
        run: mihomo -v

      - name: 🧹 Prepare Sukka directory
        run: |
          set -e

          mkdir -p "${SUKKA_DIR}"

          # 仅清空 Sukka 目录自身内容，不影响其他目录
          find "${SUKKA_DIR}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

          echo "✅ Sukka directory prepared: ${SUKKA_DIR}"

      - name: 📥 Fetch Sukka ruleset
        run: |
          set -e

          TEMP_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEMP_DIR}"' EXIT

          cd "${TEMP_DIR}"

          echo "📥 Cloning SukkaLab ruleset..."
          git clone --depth 1 --branch master https://github.com/SukkaLab/ruleset.skk.moe.git

          # Sukka 目录名可能是 Clash 或 clash，使用大小写不敏感查找
          if [ -d "ruleset.skk.moe/Clash" ]; then
            CLASH_DIR="ruleset.skk.moe/Clash"
          elif [ -d "ruleset.skk.moe/clash" ]; then
            CLASH_DIR="ruleset.skk.moe/clash"
          else
            echo "❌ Error: Clash directory not found in Sukka repository"
            echo "Available directories:"
            ls -la ruleset.skk.moe/ || true
            exit 1
          fi

          cp -a "${CLASH_DIR}/." "${GITHUB_WORKSPACE}/${SUKKA_DIR}/"
          echo "✅ Sukka Clash rules copied successfully from ${CLASH_DIR}"

      - name: 🔄 Convert Sukka TXT to YAML
        run: |
          set -e

          cd "${SUKKA_DIR}"

          TXT_COUNT=$(find . -type f -name "*.txt" | wc -l)
          echo "📝 Found ${TXT_COUNT} Sukka TXT files"

          if [ "${TXT_COUNT}" -eq 0 ]; then
            echo "❌ No TXT files found"
            exit 1
          fi

          python3 << 'PYTHON_SCRIPT'
import os
import sys
import re
from pathlib import Path

# 域名规则类型（编译为 domain behavior）
DOMAIN_TYPES = {
    "DOMAIN", "HOST",
    "DOMAIN-SUFFIX", "HOST-SUFFIX",
    "DOMAIN-KEYWORD", "HOST-KEYWORD",
    "DOMAIN-WILDCARD",
}

# IP 规则类型（编译为 ipcidr behavior）
IPCIDR_TYPES = {
    "IP-CIDR", "IP-CIDR6", "IP6-CIDR",
}

# 不支持的规则类型
SKIP_TYPES = {
    "PROCESS-NAME", "PROCESS-PATH", "NETWORK",
    "DST-PORT", "SRC-PORT", "SRC-IP-CIDR",
    "GEOSITE", "GEOIP", "SRC-GEOIP", "IP-ASN",
    "RULE-SET", "AND", "OR", "NOT", "MATCH",
}

# Sukka 标记（需要删除）
SUKKA_MARKERS = [
    "7h1s_rul35et_i5_mad3_by_5ukk4w",
    "ruleset.skk.moe",
    "thisrulesetismadebysukka",
]

def is_sukka_marker(line):
    """检测是否为 Sukka 标记行"""
    line_clean = line.lower().replace("-", "").replace("_", "").replace(".", "")
    for marker in SUKKA_MARKERS:
        marker_clean = marker.lower().replace("-", "").replace("_", "").replace(".", "")
        if marker_clean in line_clean:
            return True
    return False

def is_ip_cidr(value):
    """检测是否为 IP CIDR 格式"""
    # 匹配 IPv4/IPv6 CIDR
    ipv4_pattern = r'^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    ipv6_pattern = r'^([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}/\d{1,3}$'
    return bool(re.match(ipv4_pattern, value) or re.match(ipv6_pattern, value))

txt_files = sorted(Path(".").glob("*.txt"))

if not txt_files:
    print(f"ERROR: No TXT files found in {os.getcwd()}", file=sys.stderr)
    sys.exit(1)

converted = 0
total_rules = 0
skipped = 0

for txt_file in txt_files:
    domain_rules = []
    ipcidr_rules = []
    unsupported = []
    domain_seen = set()
    ipcidr_seen = set()
    unsupported_seen = set()

    try:
        with open(txt_file, "r", encoding="utf-8") as f:
            for line in f:
                original_line = line.strip()

                # 跳过空行和注释
                if not original_line or original_line.startswith("#"):
                    continue

                # 跳过 Sukka 标记
                if is_sukka_marker(original_line):
                    continue

                # 格式 1: domainset 格式 (+.example.com)
                if original_line.startswith("+."):
                    domain = original_line[2:]
                    if domain and domain not in domain_seen:
                        domain_rules.append(domain)
                        domain_seen.add(domain)
                    continue

                # 格式 2: 标准 Clash 格式 (TYPE,value[,options])
                if "," in original_line:
                    parts = [p.strip() for p in original_line.split(",")]
                    if len(parts) >= 2:
                        rule_type = parts[0].upper()
                        value = parts[1].strip('"').strip("'")

                        if not value:
                            continue

                        # 域名类规则
                        if rule_type in DOMAIN_TYPES:
                            if value not in domain_seen:
                                domain_rules.append(value)
                                domain_seen.add(value)
                        # IP CIDR 规则（去除 no-resolve 等参数）
                        elif rule_type in IPCIDR_TYPES:
                            if value not in ipcidr_seen:
                                ipcidr_rules.append(value)
                                ipcidr_seen.add(value)
                        # 不支持的规则类型
                        elif rule_type in SKIP_TYPES:
                            unsupported_line = f"{rule_type}: {value}"
                            if unsupported_line not in unsupported_seen:
                                unsupported.append(unsupported_line)
                                unsupported_seen.add(unsupported_line)
                    continue

                # 格式 3: 纯域名或 IP CIDR（domainset 中的纯域名/IP）
                if "." in original_line and " " not in original_line:
                    # 判断是 IP CIDR 还是域名
                    if is_ip_cidr(original_line):
                        if original_line not in ipcidr_seen:
                            ipcidr_rules.append(original_line)
                            ipcidr_seen.add(original_line)
                    else:
                        if original_line not in domain_seen:
                            domain_rules.append(original_line)
                            domain_seen.add(original_line)

        # 生成 YAML 文件（根据规则类型生成不同文件）
        has_content = False

        # 如果有域名规则，生成 domain YAML
        if domain_rules:
            yaml_file = txt_file.with_suffix(".yaml")
            with open(yaml_file, "w", encoding="utf-8") as f:
                if unsupported:
                    f.write(f"# 不支持的规则 ({len(unsupported)}):\n")
                    for u in unsupported[:10]:  # 最多显示 10 条
                        f.write(f"# - {u}\n")
                    if len(unsupported) > 10:
                        f.write(f"# ... 还有 {len(unsupported) - 10} 条\n")
                    f.write("\n")

                f.write("payload:\n")
                for rule in domain_rules:
                    f.write(f"  - '{rule}'\n")

            # 标记为 domain 类型（用于后续编译）
            meta_file = txt_file.with_suffix(".yaml.meta")
            with open(meta_file, "w", encoding="utf-8") as f:
                f.write("domain\n")

            converted += 1
            total_rules += len(domain_rules)
            has_content = True
            print(f"✅ {txt_file.name}: {len(domain_rules)} domain rules")

        # 如果有 IP CIDR 规则，生成 ipcidr YAML
        if ipcidr_rules:
            yaml_file = txt_file.with_suffix(".ipcidr.yaml")
            with open(yaml_file, "w", encoding="utf-8") as f:
                f.write("payload:\n")
                for rule in ipcidr_rules:
                    f.write(f"  - '{rule}'\n")

            # 标记为 ipcidr 类型
            meta_file = txt_file.with_suffix(".ipcidr.yaml.meta")
            with open(meta_file, "w", encoding="utf-8") as f:
                f.write("ipcidr\n")

            converted += 1
            total_rules += len(ipcidr_rules)
            has_content = True
            print(f"✅ {txt_file.name}: {len(ipcidr_rules)} ipcidr rules")

        if not has_content:
            skipped += 1

    except Exception as e:
        print(f"⚠️ Failed: {txt_file.name}: {e}", file=sys.stderr)
        skipped += 1

print(f"\n✅ Converted {converted} rule files ({total_rules} total rules)")
if skipped > 0:
    print(f"⚠️ Skipped {skipped} files")

if converted == 0:
    print("ERROR: No files were successfully converted!", file=sys.stderr)
    sys.exit(1)

PYTHON_SCRIPT

      - name: 🔨 Compile Sukka YAML to MRS
        run: |
          set -e

          cd "${SUKKA_DIR}"

          mapfile -t yaml_files < <(find . -type f -name "*.yaml" | sort)

          YAML_COUNT="${#yaml_files[@]}"
          echo "📝 Found ${YAML_COUNT} Sukka YAML files"

          if [ "${YAML_COUNT}" -eq 0 ]; then
            echo "❌ No Sukka YAML files found"
            exit 1
          fi

          # 删除旧的 .mrs 和 .meta 文件
          find . -type f \( -name "*.mrs" -o -name "*.meta" \) -delete

          COMPILED=0
          FAILED=0

          for yaml_file in "${yaml_files[@]}"; do
            # 移除路径中的 ./ 前缀
            yaml_file="${yaml_file#./}"

            # 检查是否有对应的 .meta 文件指示类型
            meta_file="${yaml_file}.meta"
            behavior_type="domain"  # 默认为 domain

            if [ -f "${meta_file}" ]; then
              behavior_type=$(cat "${meta_file}" | tr -d '[:space:]')
            fi

            # 为 ipcidr 类型生成特殊的文件名
            if [[ "${yaml_file}" == *.ipcidr.yaml ]]; then
              mrs_file="${yaml_file%.ipcidr.yaml}.ipcidr.mrs"
              behavior_type="ipcidr"
            else
              mrs_file="${yaml_file%.yaml}.mrs"
            fi

            echo "Compiling: ${yaml_file} (${behavior_type}) -> ${mrs_file}"

            # 根据检测到的类型编译
            if mihomo convert-ruleset "${behavior_type}" yaml "${yaml_file}" "${mrs_file}" 2>/dev/null; then
              COMPILED=$((COMPILED + 1))
            else
              # 如果指定类型失败，尝试另一种类型
              if [ "${behavior_type}" == "domain" ]; then
                fallback_type="ipcidr"
              else
                fallback_type="domain"
              fi

              echo "  ⚠️ ${behavior_type} failed, trying ${fallback_type}..."

              if mihomo convert-ruleset "${fallback_type}" yaml "${yaml_file}" "${mrs_file}" 2>/dev/null; then
                COMPILED=$((COMPILED + 1))
                echo "  ✅ Succeeded with ${fallback_type}"
              else
                echo "  ❌ Failed with both types: ${yaml_file}"
                FAILED=$((FAILED + 1))
              fi
            fi
          done

          MRS_COUNT=$(find . -type f -name "*.mrs" | wc -l)
          echo ""
          echo "✅ Sukka compilation completed: ${COMPILED}/${YAML_COUNT} succeeded, ${FAILED} failed"
          echo "📦 Generated MRS files: ${MRS_COUNT}"

          if [ "${FAILED}" -gt 0 ]; then
            echo "⚠️ Warning: Some YAML files failed to compile"
          fi

      - name: 📝 Generate Sukka README
        run: |
          set -e

          cat > "${SUKKA_DIR}/README.md" << EOF
          # Sukka mihomo Rules

          > Auto-synced from [SukkaLab/ruleset.skk.moe](https://github.com/SukkaLab/ruleset.skk.moe) Clash format
          > Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          > Compiled with: mihomo ${MIHOMO_VERSION}

          EOF

          TOTAL_TXT=$(find "${SUKKA_DIR}" -type f -name "*.txt" | wc -l)
          TOTAL_YAML=$(find "${SUKKA_DIR}" -type f -name "*.yaml" | wc -l)
          TOTAL_MRS=$(find "${SUKKA_DIR}" -type f -name "*.mrs" | wc -l)

          echo "**Total: ${TOTAL_TXT} TXT | ${TOTAL_YAML} YAML | ${TOTAL_MRS} MRS**" >> "${SUKKA_DIR}/README.md"
          echo "" >> "${SUKKA_DIR}/README.md"

          echo "## Available Rules" >> "${SUKKA_DIR}/README.md"
          echo "" >> "${SUKKA_DIR}/README.md"

          # 按规则类型分组显示
          echo "### Domain Rules" >> "${SUKKA_DIR}/README.md"
          find "${SUKKA_DIR}" -type f -name "*.mrs" ! -name "*.ipcidr.mrs" | sort | sed 's|^.*/||' | sed 's|\.mrs$||' | awk '{print "- `" $0 "`"}' >> "${SUKKA_DIR}/README.md"
          echo "" >> "${SUKKA_DIR}/README.md"

          echo "### IP CIDR Rules" >> "${SUKKA_DIR}/README.md"
          find "${SUKKA_DIR}" -type f -name "*.ipcidr.mrs" | sort | sed 's|^.*/||' | sed 's|\.ipcidr\.mrs$||' | awk '{print "- `" $0 "`"}' >> "${SUKKA_DIR}/README.md"

      - name: 📊 Show generated Sukka files
        run: |
          echo "📁 Sukka TXT files:"
          find "${SUKKA_DIR}" -type f -name "*.txt" | wc -l
          echo ""
          echo "📁 Sukka YAML files:"
          find "${SUKKA_DIR}" -type f -name "*.yaml" | wc -l
          echo ""
          echo "📁 Sukka MRS files:"
          find "${SUKKA_DIR}" -type f -name "*.mrs" | sort || true
          echo ""
          echo "📄 README:"
          ls -l "${SUKKA_DIR}/README.md" || true

      - name: 💾 Commit and push Sukka rules
        run: |
          set -e

          # 仅添加规则文件，不添加 .meta 临时文件
          git add "${SUKKA_DIR}/*.txt" "${SUKKA_DIR}/*.yaml" "${SUKKA_DIR}/*.mrs" "${SUKKA_DIR}/README.md" 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "✅ No changes in Sukka mihomo rules"
            exit 0
          fi

          CHANGED_FILES=$(git diff --cached --name-only | wc -l)

          cat > /tmp/commit_msg.txt << EOF
          chore(sukka-mihomo): daily sync [${CHANGED_FILES} files]

          Auto-synced from SukkaLab/ruleset.skk.moe (Clash format)
          - Compiled with mihomo ${MIHOMO_VERSION}
          - Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF

          git commit -F /tmp/commit_msg.txt

          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "✅ Push successful"
              exit 0
            fi

            echo "⚠️ Push failed, retrying (${i}/3)..."
            git pull --rebase origin main
            sleep 2
          done

          echo "❌ Push failed after 3 attempts"
          exit 1

      - name: 📝 Generate summary
        if: always()
        run: |
          {
            echo "## 📊 Sukka mihomo Rules Sync Summary"
            echo ""
            echo "- **Time**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "- **Compiler**: mihomo ${MIHOMO_VERSION}"

            if [ -d "${SUKKA_DIR}" ]; then
              TXT_COUNT=$(find "${SUKKA_DIR}" -type f -name "*.txt" | wc -l)
              YAML_COUNT=$(find "${SUKKA_DIR}" -type f -name "*.yaml" | wc -l)
              MRS_COUNT=$(find "${SUKKA_DIR}" -type f -name "*.mrs" | wc -l)
              echo "- **TXT Files**: ${TXT_COUNT}"
              echo "- **YAML Files**: ${YAML_COUNT}"
              echo "- **MRS Files**: ${MRS_COUNT}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
