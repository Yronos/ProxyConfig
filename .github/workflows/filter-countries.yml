name: Filter Country Domain Rules

on:
  schedule:
    - cron: "0 2 * * 0" # UTC 周日 02:00 = 北京周日 10:00
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "auto/filter_countries.py"

jobs:
  filter-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests urllib3

      - name: 🗂️ Ensure base directories exist
        run: |
          mkdir -p rules
          echo "✅ Base directory created"
          ls -la

      - name: 🚀 Run filter_countries.py
        id: run_script
        run: |
          cd auto
          python filter_countries.py
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "❌ Script failed with exit code $exit_code"
            exit $exit_code
          fi
          echo "✅ Script completed successfully"

      - name: ✅ Verify output
        id: verify
        run: |
          if [ ! -d "rules" ]; then
            echo "❌ Directory rules/ not found"
            exit 1
          fi

          # 递归查找所有.list文件（排除 original 子目录）
          file_count=$(find rules -name "*.list" -type f ! -path "*/original/*" | wc -l)

          if [ "$file_count" -eq 0 ]; then
            echo "❌ No .list files generated"
            echo "📂 Directory structure:"
            tree rules/ || ls -lR rules/
            exit 1
          fi

          echo "✅ Generated $file_count rule files"
          echo "file_count=$file_count" >> $GITHUB_OUTPUT

          # 统计各类型规则数量
          mihomo_count=$(find rules/mihomo -name "*.list" -type f ! -path "*/original/*" 2>/dev/null | wc -l)
          surge_count=$(find rules/surge -name "*.list" -type f ! -path "*/original/*" 2>/dev/null | wc -l)
          loon_count=$(find rules/loon -name "*.list" -type f ! -path "*/original/*" 2>/dev/null | wc -l)
          non_ip_count=$(find rules/non_ip -name "*.list" -type f 2>/dev/null | wc -l)

          echo "mihomo_count=$mihomo_count" >> $GITHUB_OUTPUT
          echo "surge_count=$surge_count" >> $GITHUB_OUTPUT
          echo "loon_count=$loon_count" >> $GITHUB_OUTPUT
          echo "non_ip_count=$non_ip_count" >> $GITHUB_OUTPUT

          # 计算总大小
          total_size=$(du -sh rules | cut -f1)
          echo "total_size=$total_size" >> $GITHUB_OUTPUT

      - name: 📊 Show detailed file structure
        run: |
          echo "📋 Complete directory structure:"
          echo "-----------------------------------"

          if command -v tree &> /dev/null; then
            tree -h rules/
          else
            echo "📂 rules/"
            for rule_type in mihomo surge loon non_ip; do
              if [ -d "rules/$rule_type" ]; then
                echo ""
                echo "  📂 $rule_type/"

                # 显示 original 目录（non_ip 除外）
                if [ "$rule_type" != "non_ip" ] && [ -d "rules/$rule_type/original" ]; then
                  echo "    📂 original/"
                  find "rules/$rule_type/original" -type f -name "*.list" -exec sh -c 'echo "      ├─ $(basename {}) ($(wc -l < {} | tr -d " ") lines)"' \;
                fi

                # 显示处理后的文件
                echo "    📄 Processed files:"
                find "rules/$rule_type" -maxdepth 1 -type f -name "*.list" -exec sh -c 'echo "      ├─ $(basename {}) ($(wc -l < {} | tr -d " ") lines, $(du -h {} | cut -f1))"' \;
              fi
            done
          fi

      - name: 💾 Commit and push changes
        run: |
          # 配置 Git
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 显示当前状态
          echo "📂 Git status before adding files:"
          git status

          # 添加 rules 目录下的所有文件
          git add -f rules/

          # 检查是否有文件被添加
          echo ""
          echo "📂 Files to be committed:"
          git diff --cached --name-only || echo "No files staged"

          # 如果有变化就提交
          if ! git diff --cached --quiet; then
            # 获取变更的文件列表
            changed_files=$(git diff --cached --name-only | wc -l)

            # 创建提交信息
            cat > /tmp/commit_msg.txt << EOF
          🤖 Auto-update: Filter domain rules

          📅 Generated: $(date +'%Y-%m-%d %H:%M:%S UTC')
          📊 Statistics:
             • Total files: ${{ steps.verify.outputs.file_count }}
             • Mihomo: ${{ steps.verify.outputs.mihomo_count }}
             • Surge: ${{ steps.verify.outputs.surge_count }}
             • Loon: ${{ steps.verify.outputs.loon_count }}
             • Non-IP: ${{ steps.verify.outputs.non_ip_count }}
             • Total size: ${{ steps.verify.outputs.total_size }}
             • Changed files: ${changed_files}

          🔄 Workflow: ${{ github.workflow }}
          🏃 Run: #${{ github.run_number }}
          🔗 Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

            echo "💾 Committing changes..."
            git commit -F /tmp/commit_msg.txt

            echo "🚀 Pushing to repository..."
            git push origin HEAD:main

            echo "✅ Successfully committed and pushed ${changed_files} files!"
          else
            echo "📌 No changes detected, skipping commit"
          fi

      - name: 📤 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: filtered-rules-${{ github.run_number }}
          path: |
            rules/**/*.list
          retention-days: 30
          if-no-files-found: warn

      - name: 📝 Generate summary
        if: always()
        run: |
          {
            echo "## 🎯 Domain Rules Filtering Results"
            echo ""
            echo "### 📊 Statistics"
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total Files | **${{ steps.verify.outputs.file_count }}** |"
            echo "| Mihomo Rules | **${{ steps.verify.outputs.mihomo_count }}** |"
            echo "| Surge Rules | **${{ steps.verify.outputs.surge_count }}** |"
            echo "| Loon Rules | **${{ steps.verify.outputs.loon_count }}** |"
            echo "| Non-IP Rules | **${{ steps.verify.outputs.non_ip_count }}** |"
            echo "| Total Size | **${{ steps.verify.outputs.total_size }}** |"
            echo "| Execution Time | $(date +'%Y-%m-%d %H:%M:%S UTC') |"
            echo "| Workflow Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "### 📁 File Structure"
            echo ""
            echo "#### Mihomo Rules"
            echo "\`\`\`"
            find rules/mihomo -maxdepth 1 -name "*.list" -type f -exec sh -c 'echo "📄 $(basename {}) - $(wc -l < {}) lines"' \; 2>/dev/null || echo "No files"
            echo "\`\`\`"
            echo ""
            echo "#### Surge Rules"
            echo "\`\`\`"
            find rules/surge -maxdepth 1 -name "*.list" -type f -exec sh -c 'echo "📄 $(basename {}) - $(wc -l < {}) lines"' \; 2>/dev/null || echo "No files"
            echo "\`\`\`"
            echo ""
            echo "#### Loon Rules"
            echo "\`\`\`"
            find rules/loon -maxdepth 1 -name "*.list" -type f -exec sh -c 'echo "📄 $(basename {}) - $(wc -l < {}) lines"' \; 2>/dev/null || echo "No files"
            echo "\`\`\`"
            echo ""
            echo "#### Non-IP Rules (Surge)"
            echo "\`\`\`"
            find rules/non_ip -name "*.list" -type f -exec sh -c 'echo "📄 $(basename {}) - $(wc -l < {}) lines"' \; 2>/dev/null || echo "No files"
            echo "\`\`\`"
            echo ""
            echo "### 🔗 Artifacts"
            echo "Download the generated files from the [Artifacts section](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          } >> $GITHUB_STEP_SUMMARY

      - name: 🔔 Notify on failure
        if: failure()
        run: |
          echo "❌ Workflow failed!"
          echo "📋 Debug information:"
          echo "---"
          ls -lR rules/ 2>/dev/null || echo "rules/ directory not found"
          echo "---"
          echo "Check the logs above for details."
