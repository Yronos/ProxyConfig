name: Filter Reject Rules

on:
  schedule:
    - cron: "5 0 * * 2"

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "auto/filter_reject_white.py"
      - ".github/workflows/filter-reject-domainset.yml"

jobs:
  filter-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run filter script
        run: |
          python auto/filter_reject_white.py
        continue-on-error: false

      - name: Check for changes
        id: check_changes
        run: |
          git add rules/lite/reject.list
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 从生成文件头读取统计信息
          STATS=$(head -8 rules/lite/reject.list 2>/dev/null | grep -E "^# (Total|Kept|Removed)" | sed 's/^# //' || echo "")

          git commit -m "chore: update lite reject rules [skip ci]

          Auto-generated by GitHub Actions
          $STATS"

          git push origin HEAD:main

      - name: Upload rules as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reject-rules-${{ github.run_number }}
          path: rules/lite/reject.list
          retention-days: 30
          if-no-files-found: warn

      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 执行摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TARGET="rules/lite/reject.list"

          if [ -f "$TARGET" ]; then
            echo "✅ 规则文件已生成" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### 文件信息" >> $GITHUB_STEP_SUMMARY
            SIZE=$(ls -lh "$TARGET" | awk '{print $5}')
            echo "- \`$TARGET\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### 规则统计" >> $GITHUB_STEP_SUMMARY
            head -10 "$TARGET" | grep -E "^# (Total|Kept|Removed|Generated)" | sed 's/^# /- /' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 未找到生成的规则文件" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 执行时间" >> $GITHUB_STEP_SUMMARY
          echo "- $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
