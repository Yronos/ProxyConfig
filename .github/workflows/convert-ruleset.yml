# .github/workflows/convert-ruleset.yml
name: Convert Domain-Set to Rule-Set

on:
  schedule:
    - cron: "0 18 * * *" # UTC 每天 18:00 = 北京次日 02:00
  workflow_dispatch: # 支持手动触发
  push:
    branches:
      - main
    paths:
      - "auto/convert_ruleset.py"

concurrency:
  group: convert-domainset-rules
  cancel-in-progress: false

jobs:
  convert-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests urllib3

      - name: 🗂️ Ensure directories exist
        run: |
          mkdir -p rules/rule-set
          echo "✅ Directories created"
          ls -la rules/

      - name: 🔄 Run convert_ruleset.py
        id: run_convert
        run: |
          cd auto
          python convert_ruleset.py
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "❌ Script failed with exit code $exit_code"
            exit $exit_code
          fi
          echo "✅ Conversion completed successfully"

      - name: ✅ Verify output
        id: verify
        run: |
          if [ ! -d "rules/rule-set" ]; then
            echo "❌ Directory rules/rule-set not found"
            exit 1
          fi

          # 查找所有转换后的文件
          file_count=$(find rules/rule-set -type f \( -name "*.list" -o -name "*.conf" \) | wc -l)

          if [ "$file_count" -eq 0 ]; then
            echo "⚠️ No rule files generated"
            echo "file_count=0" >> $GITHUB_OUTPUT
          else
            echo "✅ Generated $file_count rule files"
            echo "file_count=$file_count" >> $GITHUB_OUTPUT
          fi

          # 计算总大小
          total_size=$(du -sh rules/rule-set 2>/dev/null | cut -f1 || echo "0")
          echo "total_size=$total_size" >> $GITHUB_OUTPUT

      - name: 📊 Show file structure
        run: |
          echo "📋 Rule-Set directory structure:"
          echo "-----------------------------------"
          if command -v tree &> /dev/null; then
            tree -h rules/rule-set/ 2>/dev/null || echo "Directory empty or not found"
          else
            find rules/rule-set -type f -exec sh -c 'echo "  📄 {} ($(wc -l < {} | tr -d " ") lines)"' \; 2>/dev/null || echo "No files found"
          fi

      - name: 💾 Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          echo "📂 Git status:"
          git status

          # 添加文件
          git add -f rules/rule-set/ 2>/dev/null || true

          echo ""
          echo "📂 Files to be committed:"
          git diff --cached --name-only || echo "No files staged"

          if ! git diff --cached --quiet; then
            changed_files=$(git diff --cached --name-only | wc -l)

            git commit -m "🔄 Auto-update: Convert rule-set files

          📅 Generated: $(date +'%Y-%m-%d %H:%M:%S UTC')
          📊 Files: ${{ steps.verify.outputs.file_count }}
          📦 Size: ${{ steps.verify.outputs.total_size }}

          🔄 Workflow: ${{ github.workflow }}
          🏃 Run: #${{ github.run_number }}"

            echo "🚀 Pushing to repository..."
            git push origin HEAD:main

            echo "✅ Successfully committed ${changed_files} files!"
          else
            echo "📌 No changes detected, skipping commit"
          fi

      - name: 📤 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: converted-rules-${{ github.run_number }}
          path: rules/rule-set/**
          retention-days: 30
          if-no-files-found: warn

      - name: 📝 Generate summary
        if: always()
        run: |
          {
            echo "## 🔄 Rule-Set Conversion Results"
            echo ""
            echo "### 📊 Statistics"
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Files Generated | **${{ steps.verify.outputs.file_count }}** |"
            echo "| Total Size | **${{ steps.verify.outputs.total_size }}** |"
            echo "| Execution Time | $(date +'%Y-%m-%d %H:%M:%S UTC') |"
            echo ""
            echo "### 📁 Generated Files"
            echo "\`\`\`"
            find rules/rule-set -type f -exec sh -c 'echo "📄 {} - $(wc -l < {}) lines"' \; 2>/dev/null || echo "No files found"
            echo "\`\`\`"
          } >> $GITHUB_STEP_SUMMARY
