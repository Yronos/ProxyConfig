name: Filter Global Rules

on:
  # 定时执行：每 7 天的 UTC 00:10
  # 北京时间：每周一 08:10
  schedule:
    - cron: "10 0 * * 1"

  # 支持手动触发
  workflow_dispatch:

  # 当脚本或 workflow 修改时触发
  push:
    branches:
      - main
    paths:
      - "auto/filter_global.py"
      - ".github/workflows/filter-global.yml"

concurrency:
  group: filter-global-rules
  cancel-in-progress: false

jobs:
  filter-global:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 可选：缓存远程规则下载结果
      # 如果你的 filter_global.py 使用了 .cache/ruleset 缓存目录，这一步会加速执行
      - name: Cache ruleset downloads
        uses: actions/cache@v4
        with:
          path: .cache/ruleset
          key: ruleset-cache-global-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ruleset-cache-global-${{ runner.os }}-

      # 4. 安装依赖
      # 你的原始脚本只使用 Python 标准库，因此这里不需要 pip install requests
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      # 5. 执行 Global 筛选脚本
      #
      # 注意：
      # 这里不要 cd auto
      # 因为你的脚本里 OUTPUT_DIR = "./rules/lite"
      # 如果 cd auto，会输出到 auto/rules/lite
      # 从仓库根目录执行，才会输出到 rules/lite
      - name: Run filter_global.py
        id: run_script
        run: |
          python auto/filter_global.py

      # 6. 检查生成文件
      - name: Check generated files
        run: |
          echo "Current directory:"
          pwd

          echo ""
          echo "Generated files:"
          find rules -type f -maxdepth 3 2>/dev/null | sort || true

          if [ ! -f "rules/lite/Global.list" ]; then
            echo "❌ rules/lite/Global.list not found"
            exit 1
          fi

          echo "✅ rules/lite/Global.list generated"

      # 7. 检查是否有变化
      - name: Check for changes
        id: check_changes
        run: |
          git add rules/lite/Global.list

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
          fi

      # 8. 提交并推送变化
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          RULE_COUNT=$(grep -Ev '^\s*$|^\s*#' rules/lite/Global.list | wc -l | tr -d ' ')

          git commit -m "chore: update lite Global rules [skip ci]

          Auto-generated by GitHub Actions
          Rules: ${RULE_COUNT}
          Source: filter_global.py"

          git push origin HEAD:main

      # 9. 上传生成的规则作为 artifact
      - name: Upload Global rules as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: global-rules-${{ github.run_number }}
          path: |
            rules/lite/Global.list
          retention-days: 30
          if-no-files-found: warn

      # 10. 输出执行摘要
      - name: Generate summary
        if: always()
        run: |
          echo "## 🌍 Global 规则生成摘要" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f "rules/lite/Global.list" ]; then
            RULE_COUNT=$(grep -Ev '^\s*$|^\s*#' rules/lite/Global.list | wc -l | tr -d ' ')
            FILE_SIZE=$(du -h rules/lite/Global.list | awk '{print $1}')

            echo "✅ 规则文件已生成" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 生成文件" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`rules/lite/Global.list\` (${FILE_SIZE})" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 规则统计" >> "$GITHUB_STEP_SUMMARY"
            echo "- 有效规则数: ${RULE_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ 未找到 \`rules/lite/Global.list\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 执行信息" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: \`${{ github.workflow }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run ID: \`${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
