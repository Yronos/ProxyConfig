name: Sync and Compile Sukka Rules (Scheduled)

on:
  schedule:
    - cron: "0 13 * * *" # 每天 UTC 13:00 (北京时间 21:00)
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-compile-sing-box-rules.yml"

permissions:
  contents: write

concurrency:
  group: sing-box-rules-main
  cancel-in-progress: false

env:
  SUKKA_DIR: rules/sing-box/sukka

jobs:
  sync_sukka:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: ⚙️ Set up Git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: ⚙️ Install sing-box
        run: |
          set -e

          SING_BOX_VERSION="$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')"
          echo "Latest sing-box version: ${SING_BOX_VERSION}"
          echo "SING_BOX_VERSION=${SING_BOX_VERSION}" >> "$GITHUB_ENV"

      - name: Cache sing-box
        id: cache-singbox
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sing-box
          key: sing-box-${{ env.SING_BOX_VERSION }}-linux-amd64

      - name: ⬇️ Download sing-box
        if: steps.cache-singbox.outputs.cache-hit != 'true'
        run: |
          set -e

          DOWNLOAD_URL="https://github.com/SagerNet/sing-box/releases/download/${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION#v}-linux-amd64.tar.gz"

          curl -L -o sing-box.tar.gz "$DOWNLOAD_URL"
          tar -xzf sing-box.tar.gz

          find . -type f -name sing-box -exec chmod +x {} \;
          SING_BOX_BIN="$(find . -type f -name sing-box | head -n 1)"
          sudo mv "$SING_BOX_BIN" /usr/local/bin/sing-box

      - name: ✅ Verify sing-box installation
        run: sing-box version

      - name: 🧹 Prepare Sukka directory
        run: |
          set -euo pipefail

          mkdir -p "${SUKKA_DIR}"

          # 仅清空 Sukka 目录自身内容，不影响其他目录
          find "${SUKKA_DIR}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

          echo "✅ Sukka directory prepared: ${SUKKA_DIR}"

      - name: 📥 Fetch Sukka ruleset
        run: |
          set -euo pipefail

          TEMP_DIR="$(mktemp -d)"
          trap 'rm -rf "${TEMP_DIR}"' EXIT

          cd "${TEMP_DIR}"

          echo "📥 Cloning SukkaLab ruleset..."
          git clone --depth 1 --branch master https://github.com/SukkaLab/ruleset.skk.moe.git

          if [ -d "ruleset.skk.moe/sing-box" ]; then
            cp -a "ruleset.skk.moe/sing-box/." "${GITHUB_WORKSPACE}/${SUKKA_DIR}/"
            echo "✅ Sukka rules copied successfully"
          else
            echo "❌ Error: sing-box directory not found in Sukka repository"
            exit 1
          fi

      - name: 🔨 Compile Sukka rules
        run: |
          set -euo pipefail

          cd "${SUKKA_DIR}"

          mapfile -t json_files < <(find . -type f -name "*.json" | sort)

          JSON_COUNT="${#json_files[@]}"
          echo "📝 Found ${JSON_COUNT} Sukka JSON files"

          if [ "${JSON_COUNT}" -eq 0 ]; then
            echo "❌ No Sukka JSON files found"
            exit 1
          fi

          # 删除旧的 .srs 文件
          find . -type f -name "*.srs" -delete

          COMPILED=0
          FAILED=0

          for json_file in "${json_files[@]}"; do
            srs_file="${json_file%.json}.srs"
            echo "Compiling: ${json_file} -> ${srs_file}"

            if sing-box rule-set compile --output "${srs_file}" "${json_file}"; then
              COMPILED=$((COMPILED + 1))
            else
              echo "⚠️ Failed: ${json_file}"
              FAILED=$((FAILED + 1))
            fi
          done

          SRS_COUNT=$(find . -type f -name "*.srs" | wc -l)
          echo "✅ Sukka compilation completed: ${COMPILED}/${JSON_COUNT} succeeded, ${FAILED} failed"
          echo "📦 Generated SRS files: ${SRS_COUNT}"

          if [ "${FAILED}" -gt 0 ]; then
            echo "❌ Some Sukka JSON files failed to compile"
            exit 1
          fi

      - name: 📝 Generate Sukka README
        run: |
          set -euo pipefail

          cat > "${SUKKA_DIR}/README.md" << EOF
          # Sukka Sing-Box Rules

          > Auto-synced from [SukkaLab/ruleset.skk.moe](https://github.com/SukkaLab/ruleset.skk.moe)
          > Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          > Compiled with: sing-box v${SING_BOX_VERSION}

          EOF

          TOTAL_SRS=$(find "${SUKKA_DIR}" -type f -name "*.srs" | wc -l)
          echo "**Total: ${TOTAL_SRS} rules**" >> "${SUKKA_DIR}/README.md"
          echo "" >> "${SUKKA_DIR}/README.md"

          echo "## Available Rules" >> "${SUKKA_DIR}/README.md"
          find "${SUKKA_DIR}" -type f -name "*.srs" | sort | sed 's|^.*/||' | sed 's|\.srs$||' | awk '{print "- `" $0 "`"}' >> "${SUKKA_DIR}/README.md"

      - name: 📊 Show generated Sukka files
        run: |
          echo "📁 Sukka JSON files:"
          find "${SUKKA_DIR}" -type f -name "*.json" | sort || true
          echo ""
          echo "📁 Sukka SRS files:"
          find "${SUKKA_DIR}" -type f -name "*.srs" | sort || true
          echo ""
          echo "📄 README:"
          ls -l "${SUKKA_DIR}/README.md" || true

      - name: 💾 Commit and push Sukka rules
        run: |
          set -euo pipefail

          git add "${SUKKA_DIR}"

          if git diff --cached --quiet; then
            echo "✅ No changes in Sukka rules"
            exit 0
          fi

          CHANGED_FILES=$(git diff --cached --name-only | wc -l)

          cat > /tmp/commit_msg.txt << EOF
          chore(sukka): daily sync [${CHANGED_FILES} files]

          Auto-synced from SukkaLab/ruleset.skk.moe
          - Compiled with sing-box v${SING_BOX_VERSION}
          - Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF

          git commit -F /tmp/commit_msg.txt

          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "✅ Push successful"
              exit 0
            fi

            echo "⚠️ Push failed, retrying (${i}/3)..."
            git pull --rebase origin main
            sleep 2
          done

          echo "❌ Push failed after 3 attempts"
          exit 1

      - name: 📝 Generate summary
        if: always()
        run: |
          {
            echo "## 📊 Sukka Rules Sync Summary"
            echo ""
            echo "- **Time**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "- **Compiler**: sing-box v${SING_BOX_VERSION}"

            if [ -d "${SUKKA_DIR}" ]; then
              JSON_COUNT=$(find "${SUKKA_DIR}" -type f -name "*.json" | wc -l)
              SRS_COUNT=$(find "${SUKKA_DIR}" -type f -name "*.srs" | wc -l)
              echo "- **JSON Files**: ${JSON_COUNT}"
              echo "- **SRS Files**: ${SRS_COUNT}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
