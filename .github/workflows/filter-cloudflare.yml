name: Filter Cloudflare Rules

on:
  # UTC 时间每月2号和16号的上午9:00 (下午5:00 CST) 运行
  schedule:
    - cron: "0 9 2,16 * *"

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "auto/filter_cloudflare.py"
      - "rules/non_ip/Cloudflare.list"
      - ".github/workflows/filter-cloudflare.yml"

concurrency:
  group: filter-cloudflare-rules
  cancel-in-progress: false

jobs:
  filter-rules:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Prepare output directory
        run: |
          mkdir -p rules/lite

      - name: Run filter script
        run: |
          python auto/filter_cloudflare.py

      - name: Verify generated file
        run: |
          echo "Current directory:"
          pwd

          echo "Generated files:"
          ls -lah rules/lite || true

          if [ ! -f rules/lite/Cloudflare.list ]; then
            echo "❌ rules/lite/Cloudflare.list was not generated"
            exit 1
          fi

          echo "✅ rules/lite/Cloudflare.list generated successfully"
          wc -l rules/lite/Cloudflare.list || true

      - name: Check for changes
        id: check_changes
        run: |
          git add rules/lite/Cloudflare.list

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
            git diff --cached --stat
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: update lite Cloudflare rules [skip ci]

          Auto-generated by GitHub Actions"

          git push origin HEAD:main

      - name: Upload rules as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-rules-${{ github.run_number }}
          path: rules/lite/Cloudflare.list
          retention-days: 30
          if-no-files-found: warn

      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 执行摘要" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f rules/lite/Cloudflare.list ]; then
            echo "✅ 规则文件已生成" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            echo "### 生成的文件" >> "$GITHUB_STEP_SUMMARY"
            ls -lh rules/lite/Cloudflare.list | awk '{print "- " $9 " (" $5 ")"}' >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 规则数量" >> "$GITHUB_STEP_SUMMARY"
            echo "- Cloudflare.list: $(wc -l < rules/lite/Cloudflare.list) 行" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ 未找到生成的规则文件" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 执行时间" >> "$GITHUB_STEP_SUMMARY"
          echo "- 时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
