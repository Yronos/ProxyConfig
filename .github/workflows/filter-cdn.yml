name: Filter CDN Rules

on:
  # 每周一 UTC 00:05，北京时间 08:05
  schedule:
    - cron: "5 0 * * 1"

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "auto/filter_cdn.py"
      - ".github/workflows/filter-cdn.yml"

concurrency:
  group: filter-cdn-rules
  cancel-in-progress: true

jobs:
  filter-rules:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. 准备输出目录
      - name: Prepare output directory
        run: |
          mkdir -p rules/lite

      # 5. 执行筛选脚本
      #
      # 注意：
      # 这里不要 cd auto
      # 直接从仓库根目录执行脚本，确保生成路径是 rules/lite/CDN.list
      - name: Run filter script
        id: run_script
        run: |
          python auto/filter_cdn.py

      # 6. 检查生成结果
      - name: Verify generated file
        run: |
          echo "Current directory:"
          pwd

          echo "Generated files:"
          ls -lah rules/lite || true

          if [ ! -f rules/lite/CDN.list ]; then
            echo "❌ rules/lite/CDN.list was not generated"
            exit 1
          fi

          echo "✅ rules/lite/CDN.list generated successfully"
          wc -l rules/lite/CDN.list || true

      # 7. 检查是否有变化
      - name: Check for changes
        id: check_changes
        run: |
          git add rules/lite/CDN.list

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
          fi

      # 8. 提交变化
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: update CDN rules [skip ci]

          Auto-generated by GitHub Actions"

          git push origin HEAD:main

      # 9. 上传生成文件
      - name: Upload rules as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cdn-rules-${{ github.run_number }}
          path: rules/lite/CDN.list
          retention-days: 30
          if-no-files-found: warn

      # 10. 输出执行摘要
      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 执行摘要" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f rules/lite/CDN.list ]; then
            echo "✅ 规则文件已生成" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 生成的文件" >> "$GITHUB_STEP_SUMMARY"
            ls -lh rules/lite/*.list | awk '{print "- " $9 " (" $5 ")"}' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 规则数量" >> "$GITHUB_STEP_SUMMARY"
            echo "- CDN.list: $(wc -l < rules/lite/CDN.list) 行" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ 未找到生成的规则文件" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 执行时间" >> "$GITHUB_STEP_SUMMARY"
          echo "- 时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
