name: Filter CDN Rules

on:
  # 定时执行：每 7 天的 UTC 00:00（北京时间 08:00）
  schedule:
    - cron: "5 0 * * 1"

  # 支持手动触发
  workflow_dispatch:

  # 可选：当 filter_cdn.py 被修改时也触发
  push:
    branches:
      - main
    paths:
      - "auto/filter_cdn.py"
      - ".github/workflows/filter-cdn.yml"

jobs:
  filter-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必需：允许提交代码

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. 执行筛选脚本
      - name: Run filter script
        id: run_script
        run: |
          cd auto
          python filter_cdn.py
        continue-on-error: false # 脚本失败则停止

      # 5. 检查是否有变化
      - name: Check for changes
        id: check_changes
        run: |
          git add rules/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      # 6. 提交变化（如果有）
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 获取统计信息（如果有）
          STATS=$(grep -E "筛选后规则数|覆盖率|处理耗时" auto/../*.log 2>/dev/null | head -3 || echo "")

          git commit -m "chore: update CDN rules [skip ci]

          Auto-generated by GitHub Actions
          $STATS"

          git push origin HEAD:main

      # 7. 上传生成的文件作为 artifact
      - name: Upload rules as artifact
        if: always() # 即使前面步骤失败也上传
        uses: actions/upload-artifact@v4
        with:
          name: cdn-rules-${{ github.run_number }}
          path: rules/*.list
          retention-days: 30
          if-no-files-found: warn

      # 8. 输出执行摘要
      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 执行摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f rules/*.list ]; then
            echo "✅ 规则文件已生成" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 生成的文件" >> $GITHUB_STEP_SUMMARY
            ls -lh rules/*.list | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 未找到生成的规则文件" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 执行时间" >> $GITHUB_STEP_SUMMARY
          echo "- 开始时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
