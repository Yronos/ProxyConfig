name: Convert Local List Rules to JSON and SRS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "rules/*.list"
      - "rules/lite/*.list"
      - "auto/convert_file_json.py"
      - ".github/workflows/convert-local-list-to-json-and-srs.yml"

permissions:
  contents: write

env:
  SING_BOX_VERSION: 1.13.5
  JSON_OUTPUT_DIR: rules/sing-box

jobs:
  convert-and-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip

      - name: ⚙️ Install sing-box (cache)
        uses: actions/cache@v4
        id: cache-singbox
        with:
          path: /usr/local/bin/sing-box
          key: sing-box-${{ env.SING_BOX_VERSION }}

      - name: ⬇️ Download sing-box
        if: steps.cache-singbox.outputs.cache-hit != 'true'
        run: |
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          chmod +x sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box
          sudo mv sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box /usr/local/bin/sing-box

      - name: ✅ Verify sing-box installation
        run: sing-box version

      - name: 🧹 Prepare output directory
        run: |
          mkdir -p "${JSON_OUTPUT_DIR}"
          find "${JSON_OUTPUT_DIR}" -type f \( -name "*.json" -o -name "*.srs" \) -delete || true
          echo "✅ Output directory prepared"

      - name: 🔄 Convert .list to .json
        run: |
          python auto/convert_file_json.py

      - name: 🔨 Compile .json to .srs
        run: |
          JSON_COUNT=$(find "${JSON_OUTPUT_DIR}" -type f -name "*.json" | wc -l)
          echo "📝 Found ${JSON_COUNT} JSON files"

          if [ "${JSON_COUNT}" -eq 0 ]; then
            echo "❌ No JSON files generated"
            exit 1
          fi

          COMPILED=0
          FAILED=0

          while IFS= read -r json_file; do
            srs_file="${json_file%.json}.srs"
            echo "Compiling: ${json_file} -> ${srs_file}"

            if sing-box rule-set compile --output "${srs_file}" "${json_file}"; then
              COMPILED=$((COMPILED + 1))
            else
              echo "⚠️ Failed: ${json_file}"
              FAILED=$((FAILED + 1))
            fi
          done < <(find "${JSON_OUTPUT_DIR}" -type f -name "*.json" | sort)

          echo "✅ Compiled: ${COMPILED}, Failed: ${FAILED}"

          if [ "${FAILED}" -gt 0 ]; then
            echo "❌ Some JSON files failed to compile"
            exit 1
          fi

      - name: 📊 Show generated files
        run: |
          echo "📁 Generated JSON files:"
          find "${JSON_OUTPUT_DIR}" -type f -name "*.json" | sort || true
          echo ""
          echo "📁 Generated SRS files:"
          find "${JSON_OUTPUT_DIR}" -type f -name "*.srs" | sort || true

      - name: 💾 Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git add "${JSON_OUTPUT_DIR}"

          if git diff --cached --quiet; then
            echo "✅ No changes detected"
            exit 0
          fi

          CHANGED_FILES=$(git diff --cached --name-only | wc -l)

          cat > /tmp/commit_msg.txt << EOF
          chore(sing-box): update local rule-set outputs

          Auto-generated by GitHub Actions
          - JSON + SRS outputs updated
          - Changed files: ${CHANGED_FILES}
          - Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF

          git commit -F /tmp/commit_msg.txt
          git push origin HEAD:main

      - name: 📤 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-rule-outputs-${{ github.run_number }}
          path: |
            rules/sing-box/**/*.json
            rules/sing-box/**/*.srs
          retention-days: 30
          if-no-files-found: warn

      - name: 📝 Generate summary
        if: always()
        run: |
          {
            echo "## 📦 Local Rule Conversion Summary"
            echo ""
            echo "- **Time**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "- **sing-box version**: ${SING_BOX_VERSION}"
            echo ""
            echo "### JSON Files"
            echo "\`\`\`"
            find "${JSON_OUTPUT_DIR}" -type f -name "*.json" | sort || true
            echo "\`\`\`"
            echo ""
            echo "### SRS Files"
            echo "\`\`\`"
            find "${JSON_OUTPUT_DIR}" -type f -name "*.srs" | sort || true
            echo "\`\`\`"
          } >> $GITHUB_STEP_SUMMARY
