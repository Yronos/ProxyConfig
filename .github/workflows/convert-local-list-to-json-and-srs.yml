name: Convert Local List Rules to JSON and SRS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "rules/*.list"
      - "rules/lite/*.list"
      - "auto/convert_file_json.py"
      - ".github/workflows/convert-local-list-to-json-and-srs.yml"

permissions:
  contents: write

concurrency:
  group: sing-box-rules-main
  cancel-in-progress: false

env:
  SING_BOX_VERSION: 1.13.11
  JSON_OUTPUT_DIR: rules/sing-box
  EXCLUDE_DIR: rules/sing-box/sukka

jobs:
  convert-and-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip

      - name: ⚙️ Install sing-box (cache)
        uses: actions/cache@v4
        id: cache-singbox
        with:
          path: /usr/local/bin/sing-box
          key: sing-box-${{ env.SING_BOX_VERSION }}

      - name: ⬇️ Download sing-box
        if: steps.cache-singbox.outputs.cache-hit != 'true'
        run: |
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          chmod +x sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box
          sudo mv sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box /usr/local/bin/sing-box

      - name: ✅ Verify sing-box installation
        run: sing-box version

      - name: 🧹 Prepare output directory (exclude sukka)
        run: |
          mkdir -p "${JSON_OUTPUT_DIR}"
          mkdir -p "${EXCLUDE_DIR}"

          find "${JSON_OUTPUT_DIR}" \
            -path "${EXCLUDE_DIR}" -prune -o \
            -type f \( -name "*.json" -o -name "*.srs" \) -exec rm -f {} +

          echo "✅ Output directory prepared (excluded: ${EXCLUDE_DIR})"

      - name: 🔄 Convert .list to .json
        run: |
          python auto/convert_file_json.py

      - name: 🧽 Remove generated files inside excluded directory from current run scope
        run: |
          # 防止 convert_file_json.py 意外写入 sukka 目录
          find "${EXCLUDE_DIR}" -type f \( -name "*.json" -o -name "*.srs" \) -print || true
          git restore --source=HEAD --worktree --staged "${EXCLUDE_DIR}" 2>/dev/null || true

      - name: 🔨 Compile .json to .srs (exclude sukka)
        run: |
          mapfile -t json_files < <(
            find "${JSON_OUTPUT_DIR}" \
              -path "${EXCLUDE_DIR}" -prune -o \
              -type f -name "*.json" -print | sort
          )

          JSON_COUNT="${#json_files[@]}"
          echo "📝 Found ${JSON_COUNT} JSON files (excluding ${EXCLUDE_DIR})"

          if [ "${JSON_COUNT}" -eq 0 ]; then
            echo "❌ No JSON files generated"
            exit 1
          fi

          COMPILED=0
          FAILED=0

          for json_file in "${json_files[@]}"; do
            srs_file="${json_file%.json}.srs"
            echo "Compiling: ${json_file} -> ${srs_file}"

            if sing-box rule-set compile --output "${srs_file}" "${json_file}"; then
              COMPILED=$((COMPILED + 1))
            else
              echo "⚠️ Failed: ${json_file}"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "✅ Compiled: ${COMPILED}, Failed: ${FAILED}"

          if [ "${FAILED}" -gt 0 ]; then
            echo "❌ Some JSON files failed to compile"
            exit 1
          fi

      - name: 📊 Show generated files (exclude sukka)
        run: |
          echo "📁 Generated JSON files:"
          find "${JSON_OUTPUT_DIR}" \
            -path "${EXCLUDE_DIR}" -prune -o \
            -type f -name "*.json" -print | sort || true
          echo ""
          echo "📁 Generated SRS files:"
          find "${JSON_OUTPUT_DIR}" \
            -path "${EXCLUDE_DIR}" -prune -o \
            -type f -name "*.srs" -print | sort || true

      - name: 💾 Commit and push changes (exclude sukka)
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 仅添加非 sukka 的 json/srs 文件，避免误提交 sukka 目录
          while IFS= read -r -d '' file; do
            git add "$file"
          done < <(
            find "${JSON_OUTPUT_DIR}" \
              -path "${EXCLUDE_DIR}" -prune -o \
              -type f \( -name "*.json" -o -name "*.srs" \) -print0
          )

          if git diff --cached --quiet; then
            echo "✅ No changes detected"
            exit 0
          fi

          CHANGED_FILES=$(git diff --cached --name-only | wc -l)

          cat > /tmp/commit_msg.txt << EOF
          chore(sing-box): update local rule-set outputs

          Auto-generated by GitHub Actions
          - JSON + SRS outputs updated
          - Excluded directory: ${EXCLUDE_DIR}
          - Changed files: ${CHANGED_FILES}
          - Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF

          git commit -F /tmp/commit_msg.txt

          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "✅ Push successful"
              exit 0
            fi

            echo "⚠️ Push failed, retrying ($i/3)..."
            git pull --rebase origin main
            sleep 2
          done

          echo "❌ Push failed after 3 attempts"
          exit 1

      - name: 📤 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-rule-outputs-${{ github.run_number }}
          path: |
            rules/sing-box/**/*.json
            rules/sing-box/**/*.srs
          retention-days: 30
          if-no-files-found: warn

      - name: 📝 Generate summary
        if: always()
        run: |
          {
            echo "## 📦 Local Rule Conversion Summary"
            echo ""
            echo "- **Time**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "- **sing-box version**: ${SING_BOX_VERSION}"
            echo "- **Excluded directory**: ${EXCLUDE_DIR}"
            echo ""
            echo "### JSON Files"
            echo "\`\`\`"
            find "${JSON_OUTPUT_DIR}" \
              -path "${EXCLUDE_DIR}" -prune -o \
              -type f -name "*.json" -print | sort || true
            echo "\`\`\`"
            echo ""
            echo "### SRS Files"
            echo "\`\`\`"
            find "${JSON_OUTPUT_DIR}" \
              -path "${EXCLUDE_DIR}" -prune -o \
              -type f -name "*.srs" -print | sort || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
